<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.03"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="-60" r="320" fill="#2563EB" opacity="0.25"/>
  <circle cx="1300" cy="580" r="260" fill="#3B82F6" opacity="0.15"/>
  <circle cx="80" cy="520" r="180" fill="#1E40AF" opacity="0.3"/>

  <!-- Subtle dot grid (left half only) -->
  <defs>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="700" height="560" fill="url(#dots)"/>

  <!-- ━━━━━ LEFT: Branding ━━━━━ -->

  <!-- Icon badge -->
  <rect x="80" y="136" width="100" height="100" rx="20" fill="#2563EB"/>
  <rect x="80" y="136" width="100" height="100" rx="20" fill="#FFFFFF" opacity="0.08"/>
  <text x="130" y="210" font-family="Arial Hebrew, David, serif" font-size="66" font-weight="700" fill="#FFFFFF" text-anchor="middle">ע</text>

  <!-- Product name -->
  <text x="80" y="306" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Hebrew RTL</text>

  <!-- Tagline -->
  <text x="80" y="354" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="400" fill="#93C5FD">Automatic Hebrew text direction correction</text>
  <text x="80" y="382" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="400" fill="#93C5FD">for any website — no configuration needed.</text>

  <!-- Feature bullets -->
  <!-- bullet 1 -->
  <circle cx="92" cy="432" r="5" fill="#60A5FA"/>
  <text x="108" y="438" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#DBEAFE">Works on ChatGPT, Claude, Gemini, Slack &amp; more</text>
  <!-- bullet 2 -->
  <circle cx="92" cy="464" r="5" fill="#60A5FA"/>
  <text x="108" y="470" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#DBEAFE">Visual element picker — add any site in seconds</text>
  <!-- bullet 3 -->
  <circle cx="92" cy="496" r="5" fill="#60A5FA"/>
  <text x="108" y="502" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#DBEAFE">No data collected · Syncs across devices</text>

  <!-- ━━━━━ DIVIDER ━━━━━ -->
  <line x1="680" y1="60" x2="680" y2="500" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>

  <!-- ━━━━━ RIGHT: Popup mockup ━━━━━ -->

  <!-- Popup shadow/glow -->
  <rect x="755" y="80" width="296" height="400" rx="12" fill="#000000" opacity="0.35"/>

  <!-- Popup card -->
  <rect x="748" y="74" width="296" height="400" rx="12" fill="#FFFFFF"/>

  <!-- Popup header bar -->
  <rect x="748" y="74" width="296" height="52" rx="12" fill="#F9FAFB"/>
  <rect x="748" y="102" width="296" height="24" fill="#F9FAFB"/>
  <!-- Domain label -->
  <text x="768" y="106" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">chatgpt.com</text>
  <!-- Toggle ON -->
  <rect x="988" y="91" width="36" height="20" rx="10" fill="#2563EB"/>
  <circle cx="1014" cy="101" r="7" fill="#FFFFFF"/>

  <!-- Divider under header -->
  <line x1="748" y1="126" x2="1044" y2="126" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Selector rows -->
  <!-- Row 1 -->
  <rect x="748" y="126" width="296" height="44" fill="#FFFFFF"/>
  <rect x="762" y="143" width="10" height="10" rx="2" fill="#2563EB"/>
  <text x="780" y="152" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#374151">.markdown p</text>
  <text x="1024" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#DC2626" text-anchor="middle">×</text>
  <line x1="748" y1="170" x2="1044" y2="170" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="748" y="170" width="296" height="44" fill="#FFFFFF"/>
  <rect x="762" y="187" width="10" height="10" rx="2" fill="#2563EB"/>
  <text x="780" y="196" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#374151">[data-message] p</text>
  <text x="1024" y="196" font-family="-apple-system, sans-serif" font-size="13" fill="#DC2626" text-anchor="middle">×</text>
  <line x1="748" y1="214" x2="1044" y2="214" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Row 3 (highlighted) -->
  <rect x="748" y="214" width="296" height="44" fill="#EFF6FF"/>
  <rect x="762" y="231" width="10" height="10" rx="2" fill="#2563EB"/>
  <text x="780" y="240" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1D4ED8">.whitespace-pre-wrap</text>
  <text x="1024" y="240" font-family="-apple-system, sans-serif" font-size="13" fill="#DC2626" text-anchor="middle">×</text>
  <line x1="748" y1="258" x2="1044" y2="258" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="748" y="258" width="296" height="44" fill="#FFFFFF"/>
  <rect x="762" y="275" width="10" height="10" rx="2" fill="#D1D5DB"/>
  <text x="780" y="284" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#9CA3AF">.text-message</text>
  <text x="1024" y="284" font-family="-apple-system, sans-serif" font-size="13" fill="#DC2626" text-anchor="middle">×</text>
  <line x1="748" y1="302" x2="1044" y2="302" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Footer buttons -->
  <rect x="748" y="302" width="296" height="172" rx="0" fill="#FFFFFF"/>
  <rect x="748" y="430" width="296" height="44" rx="0" fill="#FFFFFF"/>
  <rect x="748" y="430" width="296" height="44" rx="0" fill="#F9FAFB"/>
  <rect x="748" y="430" width="296" height="44" rx="12" fill="#F9FAFB"/>
  <rect x="748" y="430" width="296" height="32" fill="#F9FAFB"/>

  <!-- + Add Selector button -->
  <rect x="762" y="312" width="120" height="32" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="822" y="333" font-family="-apple-system, sans-serif" font-size="13" fill="#111827" text-anchor="middle">+ Add Selector</text>

  <!-- Actions button -->
  <rect x="898" y="312" width="132" height="32" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="964" y="333" font-family="-apple-system, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Actions ▾</text>

  <!-- Bottom card edge rounded -->
  <rect x="748" y="450" width="296" height="24" rx="12" fill="#FFFFFF"/>
  <rect x="748" y="450" width="296" height="12" fill="#FFFFFF"/>

  <!-- ━━━━━ RIGHT: Before/After demo card ━━━━━ -->

  <!-- Demo card -->
  <rect x="1085" y="100" width="272" height="360" rx="12" fill="url(#card)" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Card header -->
  <text x="1105" y="138" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#93C5FD">Before</text>

  <!-- Before: LTR Hebrew text (looks wrong) -->
  <rect x="1105" y="150" width="232" height="68" rx="6" fill="#FFFFFF" opacity="0.06"/>
  <text x="1117" y="172" font-family="Arial Hebrew, David, serif" font-size="14" fill="#FCA5A5">שלום, איך אני יכול</text>
  <text x="1117" y="192" font-family="Arial Hebrew, David, serif" font-size="14" fill="#FCA5A5">לעזור לך היום?</text>
  <text x="1117" y="208" font-family="-apple-system, sans-serif" font-size="10" fill="#FCA5A5" opacity="0.7">← text-align: left (broken)</text>

  <!-- Arrow -->
  <text x="1221" y="252" font-family="-apple-system, sans-serif" font-size="28" fill="#60A5FA" text-anchor="middle">↓</text>

  <!-- Card header -->
  <text x="1105" y="284" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#86EFAC">After</text>

  <!-- After: RTL Hebrew text (looks correct) -->
  <rect x="1105" y="296" width="232" height="68" rx="6" fill="#FFFFFF" opacity="0.08"/>
  <text x="1325" y="318" font-family="Arial Hebrew, David, serif" font-size="14" fill="#86EFAC" text-anchor="end">שלום, איך אני יכול</text>
  <text x="1325" y="338" font-family="Arial Hebrew, David, serif" font-size="14" fill="#86EFAC" text-anchor="end">לעזור לך היום?</text>
  <text x="1325" y="354" font-family="-apple-system, sans-serif" font-size="10" fill="#86EFAC" opacity="0.7" text-anchor="end">text-align: right ✓</text>

  <!-- Badge -->
  <rect x="1148" y="388" width="148" height="32" rx="16" fill="#2563EB"/>
  <text x="1222" y="408" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Fixed automatically</text>
</svg>
