<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Before / After comparison -->
  <rect width="1280" height="800" fill="#F3F4F6"/>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#F2F2F2"/>
  <circle cx="18" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="58" cy="20" r="6" fill="#28C840"/>
  <rect x="80" y="6" width="220" height="28" rx="6" fill="#FFFFFF"/>
  <text x="100" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#333">ChatGPT</text>
  <rect x="320" y="10" width="640" height="20" rx="10" fill="#E9E9E9"/>
  <text x="640" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">chatgpt.com</text>

  <!-- Section label -->
  <rect x="0" y="40" width="1280" height="60" fill="#1E3A8A"/>
  <text x="640" y="78" font-family="-apple-system,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Before vs After — Hebrew Text Direction</text>

  <!-- BEFORE panel -->
  <rect x="40" y="128" width="560" height="620" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Before header -->
  <rect x="40" y="128" width="560" height="52" rx="16" fill="#FEF2F2"/>
  <rect x="40" y="156" width="560" height="24" fill="#FEF2F2"/>
  <text x="320" y="160" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#DC2626" text-anchor="middle">Before — Extension Off</text>
  <line x1="40" y1="180" x2="600" y2="180" stroke="#FCA5A5" stroke-width="1"/>

  <!-- Before content: LTR Hebrew (wrong) -->
  <text x="60" y="218" font-family="-apple-system,sans-serif" font-size="12" fill="#9CA3AF">ChatGPT response:</text>
  <rect x="60" y="228" width="520" height="180" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Wrong LTR alignment -->
  <text x="76" y="256" font-family="Arial Hebrew,David,serif" font-size="16" fill="#374151">שלום! אשמח לעזור לך.</text>
  <text x="76" y="280" font-family="Arial Hebrew,David,serif" font-size="16" fill="#374151">אנא שתף את השאלה שלך</text>
  <text x="76" y="304" font-family="Arial Hebrew,David,serif" font-size="16" fill="#374151">ואגיב בהקדם האפשרי.</text>
  <text x="76" y="328" font-family="Arial Hebrew,David,serif" font-size="16" fill="#374151">תודה על פנייתך אלינו.</text>
  <!-- Wrong indicator arrows -->
  <text x="76" y="388" font-family="-apple-system,sans-serif" font-size="12" fill="#EF4444">⚠ Text aligned LEFT — punctuation on wrong side</text>
  <text x="76" y="408" font-family="-apple-system,sans-serif" font-size="12" fill="#EF4444">⚠ Reading order broken for mixed content</text>
  <text x="76" y="428" font-family="-apple-system,sans-serif" font-size="12" fill="#EF4444">⚠ Lists and bullets misaligned</text>

  <!-- CSS badge wrong -->
  <rect x="60" y="448" width="200" height="28" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="160" y="466" font-family="ui-monospace,monospace" font-size="12" fill="#DC2626" text-anchor="middle">text-align: left ✗</text>
  <rect x="272" y="448" width="200" height="28" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="372" y="466" font-family="ui-monospace,monospace" font-size="12" fill="#DC2626" text-anchor="middle">direction: ltr ✗</text>

  <!-- AFTER panel -->
  <rect x="680" y="128" width="560" height="620" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- After header -->
  <rect x="680" y="128" width="560" height="52" rx="16" fill="#F0FDF4"/>
  <rect x="680" y="156" width="560" height="24" fill="#F0FDF4"/>
  <text x="960" y="160" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#16A34A" text-anchor="middle">After — Extension On</text>
  <line x1="680" y1="180" x2="1240" y2="180" stroke="#86EFAC" stroke-width="1"/>

  <!-- After content: RTL Hebrew (correct) -->
  <text x="700" y="218" font-family="-apple-system,sans-serif" font-size="12" fill="#9CA3AF">ChatGPT response:</text>
  <rect x="700" y="228" width="520" height="180" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Correct RTL alignment -->
  <text x="1204" y="256" font-family="Arial Hebrew,David,serif" font-size="16" fill="#111827" text-anchor="end">שלום! אשמח לעזור לך.</text>
  <text x="1204" y="280" font-family="Arial Hebrew,David,serif" font-size="16" fill="#111827" text-anchor="end">אנא שתף את השאלה שלך</text>
  <text x="1204" y="304" font-family="Arial Hebrew,David,serif" font-size="16" fill="#111827" text-anchor="end">ואגיב בהקדם האפשרי.</text>
  <text x="1204" y="328" font-family="Arial Hebrew,David,serif" font-size="16" fill="#111827" text-anchor="end">תודה על פנייתך אלינו.</text>
  <!-- Correct indicators -->
  <text x="700" y="388" font-family="-apple-system,sans-serif" font-size="12" fill="#16A34A">✓ Text aligned RIGHT automatically</text>
  <text x="700" y="408" font-family="-apple-system,sans-serif" font-size="12" fill="#16A34A">✓ Reading order correct for mixed content</text>
  <text x="700" y="428" font-family="-apple-system,sans-serif" font-size="12" fill="#16A34A">✓ Applied per-element, page layout unchanged</text>

  <!-- CSS badge correct -->
  <rect x="700" y="448" width="220" height="28" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="810" y="466" font-family="ui-monospace,monospace" font-size="12" fill="#16A34A" text-anchor="middle">text-align: right ✓</text>
  <rect x="932" y="448" width="200" height="28" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="1032" y="466" font-family="ui-monospace,monospace" font-size="12" fill="#16A34A" text-anchor="middle">direction: rtl ✓</text>

  <!-- Toggle illustration -->
  <rect x="700" y="496" width="520" height="60" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="780" y="521" font-family="-apple-system,sans-serif" font-size="13" fill="#1D4ED8">Master toggle</text>
  <rect x="1100" y="508" width="48" height="26" rx="13" fill="#2563EB"/>
  <circle cx="1134" cy="521" r="10" fill="#FFFFFF"/>
  <text x="780" y="543" font-family="-apple-system,sans-serif" font-size="12" fill="#6B7280">Press Ctrl+Shift+H to toggle on/off</text>

  <!-- Arrow between panels -->
  <text x="640" y="450" font-family="-apple-system,sans-serif" font-size="40" fill="#2563EB" text-anchor="middle">→</text>
</svg>
