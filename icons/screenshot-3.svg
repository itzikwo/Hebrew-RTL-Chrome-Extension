<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Element picker in action -->
  <rect width="1280" height="800" fill="#FFFFFF"/>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#F2F2F2"/>
  <circle cx="18" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="58" cy="20" r="6" fill="#28C840"/>
  <rect x="80" y="6" width="220" height="28" rx="6" fill="#FFFFFF"/>
  <text x="100" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#333">Google Gemini</text>
  <rect x="320" y="10" width="640" height="20" rx="10" fill="#E9E9E9"/>
  <text x="640" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">gemini.google.com</text>

  <!-- Page background -->
  <rect x="0" y="40" width="1280" height="760" fill="#FAFAFA"/>

  <!-- Gemini-like sidebar -->
  <rect x="0" y="40" width="220" height="760" fill="#F8F9FA" stroke="#E8EAED" stroke-width="1"/>
  <text x="24" y="84" font-family="-apple-system,sans-serif" font-size="18" font-weight="600" fill="#1F1F1F">Gemini</text>
  <rect x="16" y="100" width="188" height="36" rx="18" fill="#E8F0FE"/>
  <text x="110" y="123" font-family="-apple-system,sans-serif" font-size="13" fill="#1A73E8" text-anchor="middle">+ New chat</text>
  <text x="24" y="162" font-family="-apple-system,sans-serif" font-size="12" fill="#5F6368">Recent</text>
  <text x="24" y="188" font-family="-apple-system,sans-serif" font-size="13" fill="#3C4043">תרגום לעברית</text>
  <text x="24" y="212" font-family="-apple-system,sans-serif" font-size="13" fill="#80868B">What is React?</text>

  <!-- Chat messages area -->
  <!-- User message -->
  <text x="660" y="106" font-family="-apple-system,sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">מה ההבדל בין Python לJavaScript?</text>

  <!-- Gemini response (Hebrew) - HIGHLIGHTED with amber outline for picker -->
  <rect x="260" y="136" width="720" height="220" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="3"/>
  <!-- Amber glow -->
  <rect x="256" y="132" width="728" height="228" rx="14" fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>

  <text x="280" y="168" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#5F6368">Gemini</text>
  <text x="900" y="168" font-family="Arial Hebrew,David,serif" font-size="15" fill="#1F1F1F" text-anchor="end">שתי השפות פופולריות מאוד, אך שונות.</text>
  <text x="900" y="192" font-family="Arial Hebrew,David,serif" font-size="15" fill="#1F1F1F" text-anchor="end">Python מתאימה לניתוח נתונים ובינה מלאכותית,</text>
  <text x="900" y="216" font-family="Arial Hebrew,David,serif" font-size="15" fill="#1F1F1F" text-anchor="end">בעוד JavaScript דומיננטית בפיתוח אתרים.</text>
  <text x="900" y="240" font-family="Arial Hebrew,David,serif" font-size="15" fill="#1F1F1F" text-anchor="end">שתיהן כדאי ללמוד כמפתח מודרני.</text>
  <text x="280" y="336" font-family="-apple-system,sans-serif" font-size="12" fill="#80868B">div.message-content</text>

  <!-- Picker tooltip -->
  <rect x="700" y="300" width="260" height="88" rx="8" fill="#1F2937" opacity="0.95"/>
  <text x="720" y="322" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#F3F4F6">div.message-content</text>
  <line x1="720" y1="332" x2="940" y2="332" stroke="#374151" stroke-width="1"/>
  <text x="720" y="350" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">Tag: DIV</text>
  <text x="720" y="368" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">Class: message-content</text>
  <text x="720" y="374" font-family="-apple-system,sans-serif" font-size="11" fill="#F59E0B">↑ Click to select this element</text>
  <!-- Tooltip pointer -->
  <polygon points="760,300 772,288 784,300" fill="#1F2937" opacity="0.95"/>

  <!-- Banner at top of page -->
  <rect x="260" y="44" width="1020" height="44" rx="0" fill="#1F2937"/>
  <text x="640" y="71" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">🎯 Picker Mode Active — hover over elements and click to add an RTL selector</text>

  <!-- Cursor (hand pointer at the element) -->
  <text x="962" y="248" font-family="-apple-system,sans-serif" font-size="28" fill="#F59E0B">↖</text>

  <!-- Step callouts -->
  <rect x="260" y="400" width="300" height="80" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="280" y="426" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">Step 1</text>
  <text x="280" y="448" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Click "+ Add Selector" in popup</text>
  <text x="280" y="468" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">to activate picker mode</text>

  <rect x="590" y="400" width="300" height="80" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="610" y="426" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#92400E">Step 2</text>
  <text x="610" y="448" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Hover to highlight elements</text>
  <text x="610" y="468" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">in amber — tooltip shows selector</text>

  <rect x="920" y="400" width="300" height="80" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="940" y="426" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#166534">Step 3</text>
  <text x="940" y="448" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Click element to open the</text>
  <text x="940" y="468" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Selector Builder</text>

  <!-- Arrows -->
  <text x="558" y="446" font-family="-apple-system,sans-serif" font-size="24" fill="#9CA3AF" text-anchor="middle">→</text>
  <text x="888" y="446" font-family="-apple-system,sans-serif" font-size="24" fill="#9CA3AF" text-anchor="middle">→</text>

  <!-- Bottom description -->
  <rect x="260" y="510" width="1020" height="60" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="770" y="536" font-family="-apple-system,sans-serif" font-size="14" fill="#374151" text-anchor="middle">Add Hebrew RTL correction to any website in 3 clicks.</text>
  <text x="770" y="558" font-family="-apple-system,sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">No CSS knowledge required — the extension builds the selector for you.</text>
</svg>
