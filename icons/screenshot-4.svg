<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Selector Builder overlay -->
  <rect width="1280" height="800" fill="#FAFAFA"/>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#F2F2F2"/>
  <circle cx="18" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="58" cy="20" r="6" fill="#28C840"/>
  <rect x="80" y="6" width="220" height="28" rx="6" fill="#FFFFFF"/>
  <text x="100" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#333">Claude</text>
  <rect x="320" y="10" width="640" height="20" rx="10" fill="#E9E9E9"/>
  <text x="640" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">claude.ai</text>

  <!-- Page background -->
  <rect x="0" y="40" width="1280" height="760" fill="#FFFFFF"/>

  <!-- Claude sidebar -->
  <rect x="0" y="40" width="240" height="760" fill="#F7F7F7" stroke="#E8E8E8" stroke-width="1"/>
  <text x="24" y="84" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#1A1A1A">Claude</text>
  <rect x="16" y="98" width="208" height="36" rx="8" fill="#E8E8E8"/>
  <text x="120" y="121" font-family="-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">New conversation</text>

  <!-- Page content (dimmed - overlay present) -->
  <rect x="240" y="40" width="1040" height="760" fill="#FFFFFF" opacity="0.4"/>

  <!-- Dimmed content underneath -->
  <text x="760" y="120" font-family="-apple-system,sans-serif" font-size="14" fill="#BBBBBB" text-anchor="middle">כיצד אוכל לשפר את הכתיבה שלי בעברית?</text>
  <text x="760" y="180" font-family="Arial Hebrew,David,serif" font-size="14" fill="#BBBBBB" text-anchor="middle">הנה כמה עצות שיכולות לעזור לך:</text>

  <!-- Dim overlay -->
  <rect x="240" y="40" width="1040" height="760" fill="#000000" opacity="0.15"/>

  <!-- ━━━ Selector Builder Overlay ━━━ -->
  <!-- Shadow -->
  <rect x="334" y="148" width="620" height="500" rx="14" fill="#000" opacity="0.25"/>
  <!-- Card -->
  <rect x="328" y="142" width="620" height="500" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Header -->
  <rect x="328" y="142" width="620" height="56" rx="14" fill="#F9FAFB"/>
  <rect x="328" y="170" width="620" height="28" fill="#F9FAFB"/>
  <text x="348" y="176" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="#111827">Selector Builder</text>
  <!-- Close button -->
  <circle cx="918" cy="170" r="12" fill="#E5E7EB"/>
  <text x="918" y="175" font-family="-apple-system,sans-serif" font-size="14" fill="#374151" text-anchor="middle">✕</text>
  <line x1="328" y1="198" x2="948" y2="198" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Ancestor section -->
  <text x="348" y="226" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6B7280">ANCESTOR LEVEL</text>
  <rect x="348" y="234" width="580" height="40" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="368" y="258" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#111827">div.font-claude-message  (parent)</text>
  <text x="898" y="258" font-family="-apple-system,sans-serif" font-size="14" fill="#374151" text-anchor="middle">▾</text>

  <!-- Class filters section -->
  <text x="348" y="300" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6B7280">CLASS FILTERS</text>
  <rect x="348" y="308" width="580" height="96" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Class checkboxes -->
  <rect x="364" y="322" width="12" height="12" rx="2" fill="#2563EB"/>
  <text x="384" y="333" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#111827">font-claude-message</text>
  <rect x="364" y="346" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="384" y="357" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#9CA3AF">prose</text>
  <rect x="364" y="370" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="384" y="381" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#9CA3AF">max-w-3xl</text>
  <!-- 2nd column -->
  <rect x="564" y="322" width="12" height="12" rx="2" fill="#2563EB"/>
  <text x="584" y="333" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#111827">whitespace-pre-wrap</text>
  <rect x="564" y="346" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="584" y="357" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#9CA3AF">text-sm</text>

  <!-- Preview section -->
  <text x="348" y="428" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6B7280">LIVE PREVIEW</text>
  <rect x="348" y="436" width="580" height="44" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="368" y="454" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#1D4ED8">div.font-claude-message.whitespace-pre-wrap</text>
  <rect x="848" y="444" width="72" height="24" rx="4" fill="#2563EB"/>
  <text x="884" y="460" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">3 matched</text>

  <!-- Force RTL toggle -->
  <rect x="348" y="498" width="580" height="44" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="368" y="518" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Force RTL</text>
  <text x="368" y="534" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">Always apply RTL regardless of content detection</text>
  <rect x="876" y="508" width="36" height="20" rx="10" fill="#2563EB"/>
  <circle cx="902" cy="518" r="7" fill="#FFFFFF"/>

  <!-- Action buttons -->
  <rect x="348" y="558" width="284" height="44" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="490" y="585" font-family="-apple-system,sans-serif" font-size="14" font-weight="500" fill="#374151" text-anchor="middle">Cancel</text>
  <rect x="644" y="558" width="284" height="44" rx="8" fill="#2563EB"/>
  <text x="786" y="585" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Save Selector</text>

  <!-- Highlighted matched elements on page (blue outlines) -->
  <rect x="270" y="160" width="44" height="44" rx="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8"/>
  <rect x="960" y="230" width="280" height="60" rx="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8"/>
  <rect x="960" y="310" width="280" height="60" rx="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8"/>

  <!-- Caption -->
  <rect x="260" y="680" width="1020" height="56" rx="10" fill="#1E3A8A"/>
  <text x="770" y="703" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Selector Builder — refine your CSS selector with a live preview</text>
  <text x="770" y="723" font-family="-apple-system,sans-serif" font-size="13" fill="#93C5FD" text-anchor="middle">Matched elements are highlighted in blue on the page as you adjust settings</text>
</svg>
