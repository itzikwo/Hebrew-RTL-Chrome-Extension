<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Multi-site support showcase -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="#F3F4F6"/>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#F2F2F2"/>
  <circle cx="18" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="58" cy="20" r="6" fill="#28C840"/>
  <rect x="80" y="6" width="220" height="28" rx="6" fill="#FFFFFF"/>
  <text x="100" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#333">Hebrew RTL</text>
  <rect x="320" y="10" width="640" height="20" rx="10" fill="#E9E9E9"/>
  <text x="640" y="24" font-family="-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">Supported Sites</text>

  <!-- Header band -->
  <rect x="0" y="40" width="1280" height="80" fill="url(#heroBg)"/>
  <text x="640" y="86" font-family="-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">Works on the sites you use every day</text>
  <text x="640" y="108" font-family="-apple-system,sans-serif" font-size="15" fill="#93C5FD" text-anchor="middle">Pre-configured and ready — no setup required</text>

  <!-- Site cards grid: 2 rows × 3 cols (but 5 sites + 1 custom) -->
  <!-- Row 1 -->

  <!-- Card 1: ChatGPT -->
  <rect x="40" y="148" width="360" height="270" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Card header -->
  <rect x="40" y="148" width="360" height="56" rx="14" fill="#171717"/>
  <rect x="40" y="176" width="360" height="28" fill="#171717"/>
  <circle cx="68" cy="176" r="14" fill="#19C37D"/>
  <text x="68" y="181" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">G</text>
  <text x="96" y="182" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">ChatGPT</text>
  <text x="375" y="182" font-family="-apple-system,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" text-anchor="end">chatgpt.com</text>
  <!-- Content -->
  <rect x="60" y="220" width="320" height="64" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="360" y="242" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">שלום! איך אני יכול לעזור?</text>
  <text x="360" y="264" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">אנא שאל את שאלתך.</text>
  <rect x="300" y="298" width="80" height="20" rx="4" fill="#DCFCE7"/>
  <text x="340" y="312" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">RTL ✓</text>
  <!-- Selectors -->
  <text x="60" y="350" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">2 selectors configured</text>
  <text x="60" y="368" font-family="ui-monospace,monospace" font-size="10" fill="#6B7280">.markdown p  ·  .whitespace-pre-wrap</text>
  <rect x="280" y="382" width="100" height="20" rx="4" fill="#EFF6FF"/>
  <text x="330" y="396" font-family="-apple-system,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">● Active</text>

  <!-- Card 2: Claude -->
  <rect x="460" y="148" width="360" height="270" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="460" y="148" width="360" height="56" rx="14" fill="#1A1A1A"/>
  <rect x="460" y="176" width="360" height="28" fill="#1A1A1A"/>
  <circle cx="488" cy="176" r="14" fill="#D97706"/>
  <text x="488" y="181" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">C</text>
  <text x="516" y="182" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Claude</text>
  <text x="795" y="182" font-family="-apple-system,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" text-anchor="end">claude.ai</text>
  <rect x="480" y="220" width="320" height="64" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="780" y="242" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">בהחלט! הנה תשובה מפורטת:</text>
  <text x="780" y="264" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">כל שאלה מתקבלת בברכה.</text>
  <rect x="720" y="298" width="80" height="20" rx="4" fill="#DCFCE7"/>
  <text x="760" y="312" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">RTL ✓</text>
  <text x="480" y="350" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">2 selectors configured</text>
  <text x="480" y="368" font-family="ui-monospace,monospace" font-size="10" fill="#6B7280">.font-claude-message  ·  div[data-is-streaming]</text>
  <rect x="700" y="382" width="100" height="20" rx="4" fill="#EFF6FF"/>
  <text x="750" y="396" font-family="-apple-system,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">● Active</text>

  <!-- Card 3: Gemini -->
  <rect x="880" y="148" width="360" height="270" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="880" y="148" width="360" height="56" rx="14" fill="#1A73E8"/>
  <rect x="880" y="176" width="360" height="28" fill="#1A73E8"/>
  <text x="908" y="184" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Google Gemini</text>
  <text x="1215" y="184" font-family="-apple-system,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7" text-anchor="end">gemini.google.com</text>
  <rect x="900" y="220" width="320" height="64" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1200" y="242" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">הנה מידע רלוונטי לשאלתך:</text>
  <text x="1200" y="264" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">ישנן מספר גישות אפשריות.</text>
  <rect x="1140" y="298" width="80" height="20" rx="4" fill="#DCFCE7"/>
  <text x="1180" y="312" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">RTL ✓</text>
  <text x="900" y="350" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">1 selector configured</text>
  <text x="900" y="368" font-family="ui-monospace,monospace" font-size="10" fill="#6B7280">div.message-content</text>
  <rect x="1120" y="382" width="100" height="20" rx="4" fill="#EFF6FF"/>
  <text x="1170" y="396" font-family="-apple-system,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">● Active</text>

  <!-- Row 2 -->

  <!-- Card 4: NotebookLM -->
  <rect x="40" y="448" width="360" height="270" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="40" y="448" width="360" height="56" rx="14" fill="#1F1F1F"/>
  <rect x="40" y="476" width="360" height="28" fill="#1F1F1F"/>
  <text x="68" y="484" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">NotebookLM</text>
  <text x="375" y="484" font-family="-apple-system,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" text-anchor="end">notebooklm.google.com</text>
  <rect x="60" y="520" width="320" height="64" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="360" y="542" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">הנה סיכום המקור שלך:</text>
  <text x="360" y="564" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">המסמך עוסק ב...</text>
  <rect x="300" y="598" width="80" height="20" rx="4" fill="#DCFCE7"/>
  <text x="340" y="612" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">RTL ✓</text>
  <text x="60" y="650" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">1 selector configured</text>
  <text x="60" y="668" font-family="ui-monospace,monospace" font-size="10" fill="#6B7280">chat-message</text>
  <rect x="280" y="682" width="100" height="20" rx="4" fill="#EFF6FF"/>
  <text x="330" y="696" font-family="-apple-system,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">● Active</text>

  <!-- Card 5: Slack -->
  <rect x="460" y="448" width="360" height="270" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="460" y="448" width="360" height="56" rx="14" fill="#4A154B"/>
  <rect x="460" y="476" width="360" height="28" fill="#4A154B"/>
  <text x="488" y="484" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Slack</text>
  <text x="795" y="484" font-family="-apple-system,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" text-anchor="end">app.slack.com</text>
  <rect x="480" y="520" width="320" height="64" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="780" y="542" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">היי צוות, עדכון קצר:</text>
  <text x="780" y="564" font-family="Arial Hebrew,David,serif" font-size="13" fill="#374151" text-anchor="end">הבנייה הצליחה ✓</text>
  <rect x="720" y="598" width="80" height="20" rx="4" fill="#DCFCE7"/>
  <text x="760" y="612" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">RTL ✓</text>
  <text x="480" y="650" font-family="-apple-system,sans-serif" font-size="11" fill="#9CA3AF">1 selector configured</text>
  <text x="480" y="668" font-family="ui-monospace,monospace" font-size="10" fill="#6B7280">.c-message_kit__richtext</text>
  <rect x="700" y="682" width="100" height="20" rx="4" fill="#EFF6FF"/>
  <text x="750" y="696" font-family="-apple-system,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">● Active</text>

  <!-- Card 6: Any site -->
  <rect x="880" y="448" width="360" height="270" rx="14" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="880" y="448" width="360" height="56" rx="14" fill="#2563EB"/>
  <rect x="880" y="476" width="360" height="28" fill="#2563EB"/>
  <text x="908" y="484" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">+ Any Website</text>
  <text x="908" y="560" font-family="-apple-system,sans-serif" font-size="15" font-weight="600" fill="#1D4ED8">Add any site in seconds</text>
  <text x="908" y="586" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">Click "+ Add Selector" in the</text>
  <text x="908" y="606" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">popup, then pick elements on</text>
  <text x="908" y="626" font-family="-apple-system,sans-serif" font-size="13" fill="#374151">the page with the visual picker.</text>
  <rect x="908" y="654" width="200" height="36" rx="8" fill="#2563EB"/>
  <text x="1008" y="676" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">+ Add Selector</text>
</svg>
